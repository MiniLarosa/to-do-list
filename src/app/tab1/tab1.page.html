<ion-header>
  <ion-toolbar>
    <ion-title>Mis Tareas</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openAddTaskDialog()" id="add-task-btn">
        <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="stats-bar" *ngIf="tasks.length > 0">
    <div class="stat">
      <span class="stat-number">{{ pendingCount }}</span>
      <span class="stat-label">Pendientes</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-number completed">{{ completedCount }}</span>
      <span class="stat-label">Completadas</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-number total">{{ tasks.length }}</span>
      <span class="stat-label">Total</span>
    </div>
  </div>

  <div class="empty-state" *ngIf="tasks.length === 0">
    <ion-icon name="checkmark-circle-outline"></ion-icon>
    <h2>Aún no hay tareas</h2>
    <p>Presiona el botón <strong>+</strong> para agregar tu primera tarea.</p>
  </div>

  <ion-list *ngIf="tasks.length > 0" lines="none">
    <ion-item-sliding *ngFor="let task of tasks; trackBy: trackByTaskId" [id]="'task-' + task.id">

      <ion-item [class.completed-item]="task.completed" button (click)="toggleTask(task)">
        <ion-checkbox
          slot="start"
          [checked]="task.completed"
          (ionChange)="toggleTask(task)"
          (click)="$event.stopPropagation()">
        </ion-checkbox>
        <ion-label>
          <h2 [class.strike]="task.completed">{{ task.title }}</h2>
          <p *ngIf="task.description">{{ task.description }}</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="deleteTask(task)" [id]="'delete-' + task.id">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

</ion-content>
