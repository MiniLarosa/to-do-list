<ion-header>
  <ion-toolbar>
    <ion-title>Categorías</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openModal()">
        <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list *ngIf="categories.length > 0" lines="none" class="ion-padding-top">
    <ion-item-sliding *ngFor="let cat of categories">
      <ion-item>
        <div slot="start" class="color-dot" [style.background-color]="cat.color"></div>
        <ion-label>
          <h2>{{ cat.name }}</h2>
        </ion-label>
        <ion-button fill="clear" color="medium" slot="end" (click)="openModal(cat)">
          <ion-icon name="create-outline"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="deleteCategory(cat)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div class="empty-state" *ngIf="categories.length === 0">
    <ion-icon name="folder-open-outline"></ion-icon>
    <h2>Sin categorías</h2>
    <p>Presiona el botón <strong>+</strong> para crear una.</p>
  </div>

  <ion-modal [isOpen]="isModalOpen" (didDismiss)="cancelModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>{{ editingCategoryId ? 'Editar' : 'Nueva' }} Categoría</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="cancelModal()">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      
      <ion-content class="ion-padding">
        <ion-item>
          <ion-input label="Nombre" labelPlacement="floating" [(ngModel)]="categoryName" placeholder="Ej: Universidad"></ion-input>
        </ion-item>

        <ion-item lines="none" class="ion-margin-top">
          <ion-label>Color</ion-label>
        </ion-item>
        <div class="color-picker ion-padding-horizontal">
          <div *ngFor="let c of availableColors" 
               class="color-option" 
               [style.background-color]="c"
               [class.selected]="categoryColor === c"
               (click)="categoryColor = c">
          </div>
        </div>

        <ion-button expand="block" class="ion-margin-top" (click)="saveCategory()" [disabled]="!categoryName.trim()">
          Guardar Categoría
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
